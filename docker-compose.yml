services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    platform: linux/amd64
    ports:
      - "8000:8000"
    environment:
      - DB_DIR=/data
    volumes:
      - db_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    platform: linux/amd64
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  test:
    build:
      context: .
      dockerfile: Dockerfile.backend
    platform: linux/amd64
    environment:
      - DB_DIR=/tmp
    command: pytest -v
    profiles:
      - test

volumes:
  db_data:
